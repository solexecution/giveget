<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#10b981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GiveGet">
<meta name="description" content="Village barter board — give, get, and swap with neighbours.">
<title>Join — GiveGet</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="gg-app">
  <header class="gg-header">
    <a class="gg-brand" href="/">
      <span class="gg-brand__mark">GG</span>
      GiveGet
    </a>
    
        <div class="gg-header__actions">
          <a class="gg-icon-btn nav-desktop-only" href="/about" aria-label="How it works">?</a>
          <form method="post" action="/toggle-theme">
            <button type="submit" class="gg-icon-btn" aria-label="Switch to light mode" title="Switch to light mode">&lt;svg viewBox=&quot;0 0 24 24&quot; width=&quot;18&quot; height=&quot;18&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot; stroke-linecap=&quot;round&quot; aria-hidden=&quot;true&quot;&gt;&lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;4&quot; fill=&quot;currentColor&quot;/&gt;&lt;path d=&quot;M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41&quot;/&gt;&lt;/svg&gt;</button>
          </form>
        </div>
      
  </header>
  <main class="gg-main gg-main--anon">
    
    
    <div class="gg-signup-wrap">
      <article class="gg-signup-card">
        <h2>Join the village</h2>
        <p>See what neighbours are giving and what they need. Pick a nickname — no email or phone required.</p>
        <form method="post" action="/signup">
          <input type="text" name="nickname" placeholder="your nickname"
            pattern="[A-Za-z0-9_]{3,30}" required autocomplete="username"
            maxlength="30" autofocus>
          <button type="submit">Get started</button>
        </form>
        <small>3–30 characters · letters, numbers, underscore</small>
      </article>
    </div>
  
  </main>
  
</div>

<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
